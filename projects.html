<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Projects</title>
  <style>
    :root { --bg: #FAF8F6; --fg: #111111; --muted: #555555; --maxw: 760px; }
    body { margin: 0; background: var(--bg); color: var(--fg); font: 18px/1.7 ui-serif, Georgia, serif; padding: clamp(24px, 6vw, 64px); }
    main { max-width: var(--maxw); margin: 0 auto; }
    .back { text-decoration: none; color: var(--muted); font-size: 14px; margin-bottom: 20px; display: block; }
    h1 { font-size: 32px; margin-bottom: 20px; }
    .project-card { border: 1px solid rgba(0,0,0,0.1); padding: 30px; margin-bottom: 40px; background: #fff; }
    .tag { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; }
    h2 { margin: 10px 0; font-size: 24px; }
    .links-row { margin-top: 20px; display: flex; gap: 20px; font-size: 14px; }
    code { background: #f0f0f0; padding: 2px 5px; font-family: monospace; }
  </style>
</head>
<body>
  <main>
    <a href="/index.html" class="back">← Back to Home</a>
    <h1>AI + BI Projects</h1>
    <p style="color: var(--muted); margin-bottom: 48px;">Some projects I've worked on to solve real problems with AI-powered business intelligence.</p>

    <div id="project-list"></div>
    <!-- <article class="project-card">
      <span class="tag">Structured Intelligence for Sales Commissions</span>
      <h2>Preventing Leaks in OpEx while Saving Hours of Analyst Time</h2>
      <p>A quarterly python workflow which identifies discrepancies between expected and actual sales payouts and recommends a course of action for each mismatch. Developed using <code>Python</code>, <code>SQLite</code>, and <code>Gemini 2.0 Flash-Lite</code>.</p>
      
      <p><strong>Operational Win:</strong> Implemented both a Gen-AI (primary) and rules-based (secondary) interpretation layer for all quarterly deals from the sales team, eliminating the need for manual deal reviews.</p>

     <div class="links-row">
        <a href="/project-01-commission-auditor.html" style="text-decoration: underline; font-weight: bold; color: var(--fg);">Business Logic and Output</a>
      </div>
    </article> -->
  </main>
  <script>
    // 1. THIS IS YOUR "DATABASE"
    // To add Week 2, just add another block inside this list with your new text.
    const myProjects = [
      {
        tag: "Intelligence for Sales Commissions",
        title: "Objective: Prevent OpEx leaks while saving hours of analyst time",
        description: "A quarterly python workflow which identifies discrepancies between expected and actual sales payouts and recommends a course of action for each mismatch. Developed using <code>Python</code>, <code>SQLite</code>, and <code>Gemini 2.0 Flash-Lite</code>.",
        win: "Implemented both a Gen-AI (primary) and rules-based (secondary) interpretation layer for all quarterly deals from the sales team, eliminating the need for manual deal reviews.",
        linkUrl: "/project-01-commission-auditor.html",
        linkLabel: "Business Logic and Output"
      }, 
      {
        tag: "Budget Allocation Engine for Sales Cost Centres",
        title: "Objective: Use a fair and scalable method to allocate budgets to sales teams",
        description: "Pending",
        win: "Pending",
        linkUrl: "/project-01-commission-auditor.html",
        linkLabel: "Business Logic and Output"
      }
    ];

    // 2. THE RENDER ENGINE
    // This takes your data above and automatically wraps it in your HTML structure
    const projectContainer = document.getElementById('project-list');
    
    myProjects.forEach(project => {
      const article = document.createElement('article');
      article.className = 'project-card';
      
      article.innerHTML = `
        <span class="tag">${project.tag}</span>
        <h2>${project.title}</h2>
        <p>${project.description}</p>
        <p><strong>Operational Win:</strong> ${project.win}</p>
        <div class="links-row">
          <a href="${project.linkUrl}" style="text-decoration: underline; font-weight: bold; color: var(--fg);">${project.linkLabel}</a>
        </div>
      `;
      
      projectContainer.appendChild(article);
    });
  </script>
</body>
</html>
