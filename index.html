<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patrick James Pjesky</title>
  <meta name="description" content="Biography and contact for Patrick." />
  <meta property="og:title" content="Patrick James — About" />
  <meta property="og:description" content="A simple one‑page profile with photo and contact." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://thisispatrick.com/" />
  <meta property="og:image" content="/photo_bw.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23f5f3ef'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' font-family='system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, sans-serif' font-size='36' fill='black'%3EP%3C/text%3E%3C/svg%3E" />
  
  <style>
    :root {
      --bg: #FAF8F6;
      --fg: #111111;
      --muted: #888888;
      --link: #111111;
    }

    /* Global Reset for predictable spacing */
    *, *::before, *::after {
      box-sizing: border-box;
    }

    /* Use 100dvh to prevent mobile browser address bars from breaking the layout */
    html { 
      height: 100%; 
      background: var(--bg);
    }
    
    body { 
      min-height: 100dvh; 
      margin: 0; 
      color: var(--fg);
      font-family: ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      position: relative; /* Context for absolute footer */
    }

    /* Subtle entry animation for elegance */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    main { 
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    h1 { 
      margin: 0 0 16px 0; 
      font-size: clamp(32px, 5vw, 48px); 
      font-weight: 400; 
      letter-spacing: -0.02em;
    }

    .nav-links { 
      display: flex; 
      gap: 24px; /* Slightly wider gap to let the text breathe */
      margin: 0; 
      padding: 0;
      list-style: none;
    }

    .nav-links a { 
      color: var(--link); 
      text-decoration: none; 
      font-size: 13px; 
      text-transform: uppercase; 
      letter-spacing: 0.15em; 
      opacity: 0.5;
      transition: opacity 0.3s ease;
      padding: 4px; /* Larger clickable area for mobile */
    }

    .nav-links a:hover { 
      opacity: 1; 
    }

    /* Accessibility focus state for keyboard navigation */
    .nav-links a:focus-visible {
      opacity: 1;
      outline: 1px solid var(--fg);
      outline-offset: 4px;
    }

    /* Center the footer properly at the bottom */
    footer { 
      position: absolute;
      bottom: 4vh; /* Responsive bottom spacing */
      width: 100%;
      left: 0;
      color: var(--muted); 
      font-size: 11px; 
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fadeUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards; /* Staggered fade in */
    }

    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <a class="sr-only" href="#content">Skip to content</a>

  <main id="content">
    <h1>Patrick James Pjesky</h1>

    <nav aria-label="Main links">
      <ul class="nav-links">
        <li><a href="/contact.html">Contact</a></li>
        <!-- <li><a href="/projects.html">Projects</a></li> -->
        <li><a href="/readings.html">Readings</a></li>
      </ul>
    </nav>
  </main>

  <footer>© <span id="y"></span> PJP</footer>

  <script> 
  (function () {
    const y = new Date().getFullYear();
    function toRoman(num) {
      const map = [[1000, 'M'], [900, 'CM'], [500, 'D'], [400, 'CD'], [100, 'C'], [90, 'XC'], [50, 'L'], [40, 'XL'], [10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I']];
      let res = '';
      for (const [val, sym] of map) {
        while (num >= val) { res += sym; num -= val; }
      }
      return res;
    }
    const el = document.getElementById('y');
    if (el) {
      el.textContent = toRoman(y);
      el.setAttribute('title', y.toString()); 
    }
  })();
  </script>
</body>
</html>
