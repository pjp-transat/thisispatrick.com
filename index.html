<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Patrick James</title>
  <style>
    :root {
      --bg: #FAF8F6;
      --fg: #111111;
      --muted: #555555;
      --maxw: 760px;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 18px/1.7 ui-serif, Roboto;
      -webkit-font-smoothing: antialiased;
      padding: clamp(24px, 6vw, 64px);
    }
    main { max-width: var(--maxw); margin: 0 auto; }
    header { display: grid; grid-template-columns: 128px 1fr; gap: 24px; align-items: center; margin-bottom: 40px; }
    header img { width: 128px; height: 128px; object-fit: cover; }
    h1 { margin: 0; font-size: clamp(32px, 6vw, 54px); line-height: 1.1; }
    .subtitle { margin-top: 6px; color: var(--muted); font-size: clamp(16px, 2.2vw, 20px); }
    
    /* The Elegant Links */
    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 48px;
    }
    .nav-card {
      text-decoration: none;
      color: var(--fg);
      border: 1px solid rgba(0,0,0,0.1);
      padding: 40px 20px;
      text-align: center;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .nav-card:hover {
      background: #ffffff;
      border-color: rgba(0,0,0,0.8);
      transform: translateY(-2px);
    }
    .nav-card h2 { margin: 0; font-weight: normal; font-size: 24px; letter-spacing: 1px; }
    .nav-card span { font-size: 14px; color: var(--muted); margin-top: 8px; text-transform: uppercase; letter-spacing: 2px; }

    .links { margin-top: 14px; display: flex; gap: 14px; }
    .link { color: var(--fg); text-decoration: none; border-bottom: 1.5px solid rgba(0,0,0,.2); }
    
    @media (max-width: 560px) {
      header { grid-template-columns: 1fr; }
      .nav-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <img src="/photo_bw.jpg" alt="Patrick" />
      <div>
        <h1>Patrick James</h1>
        <p class="subtitle">American Transatlantic</p>
        <nav class="links">
          <a class="link" href="mailto:me@thisispatrick.com">Email</a>
          <a class="link" href="https://www.linkedin.com/in/pjp1993/" target="_blank">LinkedIn</a>
        </nav>
      </div>
    </header>

    <section>
      <p>London-based American working on finance, strategy, and operations.</p>
    </section>

    <nav class="nav-grid">
      <a href="/projects.html" class="nav-card">
        <h2>Projects</h2>
        <!-- <span>AI & Business Intelligence</span> -->
      </a>
      <a href="/readings.html" class="nav-card">
        <h2>Readings</h2>
        <!-- <span>Literary & Econ Notes</span> -->
      </a>
    </nav>

    <footer style="margin-top: 80px; font-size: 14px; color: var(--muted);">
      © <span id="y"></span> PJP
    </footer>
  </main>

  <script>
    document.getElementById('y').textContent = (function(y){
      const map = [[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
      let res = ''; for (const [v, s] of map) { while (y >= v) { res += s; y -= v; } }
      return res;
    })(new Date().getFullYear());
  </script>
</body>
</html>
