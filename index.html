  <style>
    :root {
      --bg: #FAF8F6;
      --fg: #111111;
      --muted: #555555;
      --link: #111111;
      --maxw: 760px;
    }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font: 18px/1.7 ui-serif, Georgia, Cambria, "Times New Roman", Times, serif;
      -webkit-font-smoothing: antialiased;
      padding: clamp(24px, 6vw, 64px);
    }
    main { max-width: var(--maxw); margin: 0 auto; }
    
    /* Tighter, Bottom-Aligned Header */
    header { 
      display: flex; 
      align-items: flex-end; /* Aligns the bottom of the text block with the bottom of the photo */
      gap: 24px; 
      margin-bottom: 32px; 
    }
    header img { width: 128px; height: 128px; object-fit: cover; display: block; }
    .header-text { display: flex; flex-direction: column; }
    h1 { margin: 0; font-size: clamp(32px, 6vw, 54px); line-height: 1; margin-bottom: 4px; }
    .subtitle { margin: 0 0 8px 0; color: var(--muted); font-size: clamp(16px, 2.2vw, 20px); line-height: 1.2; }
    
    .links { display: flex; gap: 14px; margin: 0; line-height: 1; }
    .link { color: var(--link); text-decoration: none; border-bottom: 1px solid rgba(0,0,0,.2); padding-bottom: 2px; }
    .link:hover { border-bottom-color: rgba(0,0,0,.7); }
    
    .bio { margin-bottom: 40px; font-size: 18px; }
    
    /* Tighter Nav Grid */
    .nav-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px; /* Reduced gap */
    }
    .nav-card {
      text-decoration: none;
      color: var(--fg);
      border: 1px solid rgba(0,0,0,0.1);
      padding: 32px 20px; /* Reduced vertical padding */
      text-align: center;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: #ffffff;
    }
    .nav-card:hover { border-color: rgba(0,0,0,0.8); }
    .nav-card h2 { margin: 0; font-weight: normal; font-size: 22px; letter-spacing: 0.5px; }
    
    footer { margin-top: 64px; color: var(--muted); font-size: 14px; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    
    @media (max-width: 560px) {
      header { flex-direction: column; align-items: flex-start; }
      .nav-grid { grid-template-columns: 1fr; }
    }
  </style>

  <script> 
  (function () {
    const y = new Date().getFullYear();
    function toRoman(num) {
      const map = [[1000, 'M'], [900, 'CM'], [500, 'D'], [400, 'CD'], [100, 'C'], [90, 'XC'], [50, 'L'], [40, 'XL'], [10, 'X'], [9, 'IX'], [5, 'V'], [4, 'IV'], [1, 'I']];
      let res = '';
      for (const [val, sym] of map) {
        while (num >= val) { res += sym; num -= val; }
      }
      return res;
    }
    const el = document.getElementById('y');
    if (el) {
      el.textContent = toRoman(y);
      el.setAttribute('title', y.toString()); 
    }
  })();
  </script>
